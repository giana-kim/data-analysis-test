<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>해양수산부 안내 포스터</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #eaf4fb;
  font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
}

.poster {
  width: 420px;
  min-height: 620px;
  background: linear-gradient(180deg, #ffffff 0%, #e8f6ff 55%, #d7f0ff 100%);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0, 61, 105, 0.18);
  position: relative;
  padding: 34px 28px;
  text-align: center;
}

.poster::before {
  content: "";
  position: absolute;
  left: -70px;
  right: -70px;
  bottom: -80px;
  height: 230px;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.8), transparent 18%),
    radial-gradient(circle at 70% 20%, rgba(255,255,255,0.7), transparent 16%),
    linear-gradient(135deg, #0077b6, #00a6d6);
  border-radius: 50% 50% 0 0;
  z-index: 0;
}

.badge {
  display: inline-block;
  padding: 8px 16px;
  border-radius: 999px;
  background: #e3f2ff;
  color: #0068a9;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

h1 {
  font-size: 34px;
  line-height: 1.25;
  color: #003b5c;
  margin-bottom: 14px;
  letter-spacing: -0.04em;
  position: relative;
  z-index: 1;
}

.subtitle {
  color: #34657f;
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 30px;
  position: relative;
  z-index: 1;
}

.qr-box {
  width: 230px;
  height: 230px;
  margin: 0 auto 24px;
  background: white;
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 12px 30px rgba(0, 78, 120, 0.16);
  position: relative;
  z-index: 1;
}

.qr-box img {
  width: 100%;
  height: 100%;
}

.scan-text {
  font-size: 20px;
  font-weight: 800;
  color: #00496f;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.url {
  font-size: 12px;
  color: #4d7185;
  word-break: break-all;
  margin-bottom: 34px;
  position: relative;
  z-index: 1;
}

.footer {
  position: relative;
  z-index: 1;
  color: white;
  margin-top: 40px;
}

.footer .agency {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 6px;
}

.footer .desc {
  font-size: 13px;
  opacity: 0.9;
}

.wave {
  position: absolute;
  bottom: 120px;
  left: 0;
  width: 100%;
  height: 70px;
  z-index: 0;
  opacity: 0.35;
}

.fish {
  position: absolute;
  font-size: 28px;
  opacity: 0.18;
  color: #0077b6;
}

.fish.one {
  top: 120px;
  left: 32px;
}

.fish.two {
  top: 210px;
  right: 30px;
}
</style>
</head>

<body>

<div class="poster">
  <div class="fish one">◁</div>
  <div class="fish two">◁</div>

  <div class="badge">해양수산부 안내</div>

  <h1>
    목포지방<br>
    해양수산청
  </h1>

  <p class="subtitle">
    바다와 국민을 잇는<br>
    해양 행정 안내 서비스
  </p>

  <div class="qr-box">
    <img
      id="qrCode"
      alt="목포지방해양수산청 QR코드"
    />
  </div>

  <div class="scan-text">QR코드를 스캔하세요</div>

  <div class="url">
    https://mokpo.mof.go.kr/ko/index.do
  </div>

  <div class="footer">
    <div class="agency">MINISTRY OF OCEANS AND FISHERIES</div>
    <div class="desc">깨끗한 바다 · 안전한 항만 · 신뢰받는 해양행정</div>
  </div>
</div>

<script>
const targetUrl = "https://mokpo.mof.go.kr/ko/index.do";

const qrImage = document.getElementById("qrCode");

qrImage.src =
  "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
  + encodeURIComponent(targetUrl);
</script>

</body>
</html>
